<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Mahakal Property Dealer</title>
  <script>
    // Single Page App redirect trick for GitHub Pages.
    // When GitHub Pages can't find a route (e.g. /property/1),
    // it serves this 404.html. We redirect to index.html
    // with the original path encoded in a query param so the
    // React router can pick it up.
    var pathSegmentsToKeep = 1; // keep /Client-Property-Seller
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body>
</body>
</html>
